<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Taxi Stand — Personal</title>
<style>
  :root {
    --bg: #2d1b69;
    --stand: #1565c0;
    --holding: #6a1b9a;
    --highlight: #80d8ff;
    --loading: #ffd600;
    --overflow: rgba(128,216,255,.12);
    --empty: rgba(255,255,255,0.07);
    --tile: 60px;
    --gap: 4px;
    --r: 6px;
    --label-w: 26px;
    --pad: 10px;
    --grphdr-h: 18px;
    --colhdr-h: 20px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body { overflow-x: hidden; max-width: 100vw; touch-action: manipulation; }
  body { background: var(--bg); min-height: 100dvh; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; padding: var(--pad); }

  h2 { font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--highlight); margin-bottom: 8px; opacity: 0.75; }
  .divider { height: 1px; background: linear-gradient(90deg,transparent,rgba(128,216,255,.3),transparent); margin: 14px 0; }

  /* sync indicator */
  #sync-status {
    position: fixed; top: 16px; right: 130px;
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 20px;
    opacity: 0.85; transition: background .3s, opacity .3s;
    pointer-events: none; z-index: 100;
  }
  #sync-status.ok      { background: rgba(0,200,100,.25); color: #69ffb0; }
  #sync-status.saving  { background: rgba(255,214,0,.25);  color: #ffd600; }
  #sync-status.error   { background: rgba(255,80,80,.25);  color: #ff8080; }

  /* QUEUE LAYOUT */
  #queue-wrapper { display: flex; flex-direction: row; gap: var(--gap); }
  #row-labels {
    display: flex; flex-direction: column; gap: var(--gap);
    margin-top: calc(var(--grphdr-h) + var(--gap) + var(--colhdr-h) + var(--gap));
    flex-shrink: 0;
  }
  .row-label {
    width: var(--label-w); height: var(--tile);
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 4px; font-size: 10px; font-weight: 700;
    color: rgba(128,216,255,.6); letter-spacing: .5px; flex-shrink: 0;
  }
  #queue-cols { display: flex; flex-direction: column; gap: var(--gap); min-width: 0; }
  #group-headers { display: flex; flex-direction: row; gap: var(--gap); height: var(--grphdr-h); }
  .grp-spacer { flex-shrink: 0; }
  .grp-label {
    height: var(--grphdr-h);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 800; letter-spacing: 1.5px;
    text-transform: uppercase; border-radius: 3px; flex-shrink: 0;
  }
  .grp-stand   { background: rgba(21,101,192,.35);  color: #80d8ff; }
  .grp-holding { background: rgba(106,27,154,.35);  color: #ce93d8; }
  .col-headers { display: flex; flex-direction: row; gap: var(--gap); height: var(--colhdr-h); }
  .col-header {
    width: var(--tile); height: var(--colhdr-h);
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: rgba(128,216,255,.55);
    letter-spacing: .5px; flex-shrink: 0;
  }
  #queue-grid { display: flex; flex-direction: column; gap: var(--gap); }
  .qrow { display: flex; flex-direction: row; gap: var(--gap); }
  .qrow.new-row { animation: rowIn .22s cubic-bezier(.34,1.56,.64,1); }
  @keyframes rowIn { from { opacity:0; transform:translateY(-10px) scale(.96); } to { opacity:1; transform:none; } }

  /* TILE */
  .tile {
    width: var(--tile); height: var(--tile);
    border-radius: var(--r);
    display: flex; align-items: center; justify-content: center;
    font-size: calc(var(--tile) * 0.28); font-weight: 700;
    position: relative;
    transition: transform .15s, box-shadow .15s, opacity .15s, margin-left .15s, margin-right .15s;
    flex-shrink: 0; cursor: grab;
  }
  .tile:active { cursor: grabbing; }
  .tile.dragging   { opacity: .25; transform: scale(.88); }
  .tile.drag-ready { transform: scale(1.05); box-shadow: 0 0 0 2px var(--highlight); transition: transform .15s, box-shadow .15s; }
  .tile.drop-ok  { box-shadow: 0 0 0 3px var(--highlight); transform: scale(1.07); }
  .tile.selected  { box-shadow: 0 0 0 2px var(--highlight); filter: brightness(1.35); }
  .tile.landmark  { filter: brightness(1.5); }
  .tile.my-tile { background: rgba(100,220,140,.25) !important; box-shadow: 0 0 0 1.5px rgba(100,220,140,.6) !important; color: #fff !important; }
  .tile.my-tile.q-stand { background: var(--stand) !important; box-shadow: 0 4px 14px rgba(21,101,192,.45) !important; filter: brightness(1.5); }
  .tile.my-tile.q-hold  { background: var(--holding) !important; box-shadow: 0 4px 14px rgba(106,27,154,.45) !important; filter: brightness(1.5); }
  .tile.my-tile.selected { box-shadow: 0 0 0 2px var(--highlight) !important; filter: brightness(1.35); }

  .tile .sub { position:absolute; bottom:3px; right:5px; font-size:calc(var(--tile)*0.11); font-weight:400; opacity:.5; }
  .tile.selected::before { content:'Drop?'; position:absolute; top:4px; left:0; right:0; text-align:center; font-size:calc(var(--tile)*0.18); font-weight:600; opacity:.7; pointer-events:none; }

  .q-zero     { background: rgba(180,180,180,.15); border: 1.5px solid rgba(255,255,255,.18); color: rgba(255,255,255,.5); box-shadow: none; cursor: pointer; }
  .q-zero.primed        { box-shadow: 0 0 0 2px #ffd600; color: #ffd600; }
  .q-zero.clear-armed   { box-shadow: 0 0 0 2px #ff5555; color: #ffd600; }
  .q-zero.clear-confirm { box-shadow: 0 0 0 2px #ff5555; color: #ff5555; }
  .tile.load-target { box-shadow: 0 0 0 2px #ffd600 !important; filter: brightness(1.2); }
  .q-stand    { background: var(--stand);    box-shadow: 0 4px 14px rgba(21,101,192,.45); }
  .q-hold     { background: var(--holding);  box-shadow: 0 4px 14px rgba(106,27,154,.45); }
  .q-overflow { background: var(--overflow); border: 1.5px solid rgba(128,216,255,.22); color: rgba(255,255,255,.85); }
  .q-empty    { background: var(--empty); border: 1.5px dashed rgba(255,255,255,.13); cursor: default !important; }
  .q-empty.hidden-slot { visibility: hidden; pointer-events: none; }
  .q-add { background: var(--empty); border: 1.5px dashed rgba(128,216,255,.35);
    color: rgba(128,216,255,.5); font-size: calc(var(--tile)*0.45);
    cursor: pointer; line-height: 1; }
  .q-add:hover { background: rgba(128,216,255,.08); border-color: rgba(128,216,255,.6); color: rgba(128,216,255,.8); }
  #dialpad-input {
    position: fixed; opacity: 0; pointer-events: none;
    top: 50%; left: 50%; width: 1px; height: 1px;
  }

  /* POOL */
  #pool-grid { display: grid; grid-template-columns: repeat(10, var(--tile)); gap: var(--gap); }
  .tile.pool { background: rgba(128,216,255,.12); border: 1.5px solid rgba(128,216,255,.22); color: rgba(255,255,255,.85); }

  /* GHOST */
  #ghost {
    position: fixed; pointer-events: none; z-index: 9999;
    border-radius: var(--r); display: none;
    align-items: center; justify-content: center; font-weight: 700;
    width: var(--tile); height: var(--tile);
    font-size: calc(var(--tile) * 0.28);
    opacity: .92; box-shadow: 0 10px 30px rgba(0,0,0,.65);
  }

  #zoom-btn {
    position: fixed; top: 6px; right: 6px;
    font-size: 13px; font-weight: 700; letter-spacing: 0.5px;
    padding: 10px 14px; border-radius: 12px; min-width: 44px; min-height: 44px;
    background: rgba(128,216,255,.15); color: #80d8ff;
    border: 1.5px solid rgba(128,216,255,.3);
    cursor: pointer; z-index: 100;
    transition: background .2s;
    line-height: 1;
  }
  #zoom-btn:hover { background: rgba(128,216,255,.28); }
  #zoom-btn.active { background: rgba(128,216,255,.3); color: #fff; }
</style>
</head>
<body>

<button id="zoom-btn">Bigger Tiles</button>

<div id="sync-status" class="ok">SAVED</div>

<section>
  <h2>Queue</h2>
  <div id="queue-wrapper">
    <div id="row-labels"></div>
    <div id="queue-cols">
      <div id="group-headers"></div>
      <div class="col-headers" id="col-headers"></div>
      <div id="queue-grid"></div>
    </div>
  </div>
</section>

<div class="divider"></div>

<section>
  <h2>Not in Queue</h2>
  <div id="pool-grid"></div>
</section>

<div id="ghost"></div>
<input id="dialpad-input" type="tel" inputmode="numeric" pattern="[0-9]*">

<script>

/* ── LOCAL STORAGE ── */
const STORAGE_KEY = 'taxi-queue-personal';
const syncEl = document.getElementById('sync-status');
function setSync(state) {
  syncEl.className = 'ok saving error'.split(' ').reduce((el,c)=>(el.classList.remove(c),el), syncEl) || syncEl;
  syncEl.classList.add(state);
  syncEl.textContent = state === 'ok' ? 'SAVED' : state === 'saving' ? 'SAVING…' : 'ERROR';
}


/* ── NO HISTORY IN PERSONAL VERSION ── */

/* ── SAVE TO LOCALSTORAGE ── */
let saveTimer = null;
function saveToFirebase() {  // kept same name so rest of code works unchanged
  setSync('saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(queue));
      setSync('ok');
    } catch(e) { setSync('error'); }
  }, 300);
}

/* ── DYNAMIC TILE SIZING ── */
let COLS = parseInt(localStorage.getItem('taxi-cols') || '10');

function calcTileSize() {
  const pad = 10*2;
  const labelW = 30;
  const gaps = (COLS-1)*4;
  const size = Math.floor((window.innerWidth - pad - labelW - gaps) / COLS);
  document.documentElement.style.setProperty('--tile', size + 'px');
}
calcTileSize();
window.addEventListener('resize', () => { calcTileSize(); render(); });

const zoomBtn = document.getElementById('zoom-btn');
// Sync button label to saved state on load
zoomBtn.textContent = COLS === 5 ? 'Smaller Tiles' : 'Bigger Tiles';
zoomBtn.classList.toggle('active', COLS === 5);

zoomBtn.addEventListener('click', () => {
  COLS = COLS === 10 ? 5 : 10;
  localStorage.setItem('taxi-cols', COLS);
  zoomBtn.textContent = COLS === 5 ? 'Smaller Tiles' : 'Bigger Tiles';
  zoomBtn.classList.toggle('active', COLS === 5);
  calcTileSize();
  render();
});

/* ── MY NUMBER ── */
let myNumber = parseInt(localStorage.getItem('taxi-my-number') || '0') || null;

function ensureMyNumber() {
  if (myNumber) return;
  const raw = prompt(`Enter your taxi number (1–${MAX_NUM}):`, '');
  if (!raw) return;
  const num = parseInt(raw);
  if (isNaN(num) || num < 1 || num > MAX_NUM) {
    alert(`"${raw}" is not a valid taxi number (1–${MAX_NUM}).`);
    return;
  }
  myNumber = num;
  localStorage.setItem('taxi-my-number', num);
}

ensureMyNumber();

/* ── STATE ── */
let MAX_NUM = parseInt(localStorage.getItem('taxi-max-num') || '140');
let queue = [];
let pool  = new Set();
for (let i = 1; i <= MAX_NUM; i++) pool.add(i);
let loadedPrimed = false;
let clearState = 0; // 0=normal, 1=clear-armed, 2=confirm

/* Rebuild pool from queue */
function rebuildPool(q) {
  pool = new Set();
  for (let i = 1; i <= MAX_NUM; i++) pool.add(i);
  for (const v of q) if (typeof v === 'number') pool.delete(v);
}

/* ── LOAD FROM LOCALSTORAGE ── */
try {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (raw) {
    queue = JSON.parse(raw);
    rebuildPool(queue);
  }
} catch(e) { queue = []; }

/* ── DOM ── */
const qGrid      = document.getElementById('queue-grid');
const qGrpHdrs   = document.getElementById('group-headers');
const qColHdrs   = document.getElementById('col-headers');
const qRowLabels = document.getElementById('row-labels');
const pGrid      = document.getElementById('pool-grid');
const ghostEl    = document.getElementById('ghost');

/* ── RENDER ── */
function render() { renderQueue(); renderPool(); }

function renderQueue() {
  const qLen = queue.length;
  const slotsPer = COLS - 1; const rows = (qLen + 1) <= slotsPer ? 1 : 1 + Math.ceil((qLen + 1 - slotsPer) / COLS);
  const prevRowCount = qGrid.querySelectorAll('.qrow').length;
  qGrid.innerHTML = '';

  const tileSize = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--tile'));
  const gap = 4;

  /* Group headers */
  qGrpHdrs.innerHTML = '';
  const spacer = document.createElement('div');
  spacer.className = 'grp-spacer';
  spacer.style.width = tileSize + 'px';
  qGrpHdrs.appendChild(spacer);
  const standLbl = document.createElement('div');
  standLbl.className = 'grp-label grp-stand';
  standLbl.style.width = (4*tileSize + 3*gap) + 'px';
  standLbl.textContent = 'Stand';
  qGrpHdrs.appendChild(standLbl);
  const gs = document.createElement('div');
  gs.style.width = gap + 'px';
  qGrpHdrs.appendChild(gs);
  const holdLbl = document.createElement('div');
  holdLbl.className = 'grp-label grp-holding';
  holdLbl.style.width = (4*tileSize + 3*gap) + 'px';
  holdLbl.textContent = 'Holding';
  qGrpHdrs.appendChild(holdLbl);

  /* Col headers */
  qColHdrs.innerHTML = '';
  qColHdrs.appendChild(Object.assign(document.createElement('div'), {className:'col-header'}));
  for (let c = 1; c < COLS; c++) {
    const ch = document.createElement('div');
    ch.className = 'col-header'; ch.textContent = c;
    qColHdrs.appendChild(ch);
  }

  /* Row labels */
  qRowLabels.innerHTML = '';
  qRowLabels.style.display = 'flex';
  for (let row = 0; row < rows; row++) {
    const rl = document.createElement('div');
    rl.className = 'row-label';
    rl.textContent = row === 0 ? '0' : row * COLS;
    qRowLabels.appendChild(rl);
  }

  /* Tiles */
  for (let row = 0; row < rows; row++) {
    const rowEl = document.createElement('div');
    rowEl.className = 'qrow';
    if (row >= prevRowCount) rowEl.classList.add('new-row');

    for (let col = 0; col < COLS; col++) {
      const tile = document.createElement('div');
      tile.className = 'tile';

      if (row === 0 && col === 0) {
        tile.classList.add('q-zero');
        tile.style.textAlign = 'center';
        tile.style.lineHeight = '1.2';
        tile.style.padding = '4px';
        if (clearState === 1) {
          tile.textContent = 'Clear All';
          tile.style.fontSize = 'calc(var(--tile) * 0.18)';
          tile.classList.add('clear-armed');
        } else if (clearState === 2) {
          tile.textContent = 'Are you sure?';
          tile.style.fontSize = 'calc(var(--tile) * 0.15)';
          tile.classList.add('clear-confirm');
        } else if (loadedPrimed && queue.length > 0) {
          tile.textContent = 'Loaded';
          tile.style.fontSize = 'calc(var(--tile) * 0.20)';
          tile.classList.add('primed');
        } else {
          tile.textContent = 'Loading';
          tile.style.fontSize = 'calc(var(--tile) * 0.20)';
        }
        tile.dataset.role = 'zero';

        let zeroHold = null;
        const fireHold = () => { zeroHold = null; clearSelected(); clearState = 1; render(); };
        tile.addEventListener('touchstart', () => {
          lastTouchTime = Date.now();
          zeroHold = setTimeout(fireHold, HOLD_MS);
        }, { passive: true });
        tile.addEventListener('touchmove', () => {
          if (zeroHold) { clearTimeout(zeroHold); zeroHold = null; }
        }, { passive: true });
        tile.addEventListener('touchend', e => {
          e.preventDefault();
          if (zeroHold) { clearTimeout(zeroHold); zeroHold = null; handleTap(tile); }
        });
        tile.addEventListener('mousedown', e => {
          if (e.button !== 0 || Date.now() - lastTouchTime < 500) return;
          e.preventDefault();
          zeroHold = setTimeout(fireHold, HOLD_MS);
          const onMove = () => { if (zeroHold) { clearTimeout(zeroHold); zeroHold = null; } };
          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            if (zeroHold) { clearTimeout(zeroHold); zeroHold = null; handleTap(tile); }
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
      } else {
        const qIdx = row === 0 ? (col-1) : ((COLS-1) + (row-1)*COLS + col);
        if (qIdx < queue.length) {
          const val = queue[qIdx];
          const isDummy = (val === 'filler');
          if (isDummy) {
            tile.textContent = 'Filler';
            tile.style.cssText = 'background:rgba(180,180,180,.15);border:1.5px solid rgba(255,255,255,.18);color:rgba(255,255,255,.5);font-size:calc(var(--tile)*0.16);';
          } else {
            tile.textContent = val;
            tile.classList.add(qIdx < 4 ? 'q-stand' : qIdx < 8 ? 'q-hold' : 'q-overflow');
            if (val === myNumber) tile.classList.add('my-tile');
          }
          tile.dataset.role = 'queue';
          tile.dataset.qidx = qIdx;
          tile.dataset.val  = val;
          if (qIdx === selectedQIdx) tile.classList.add('selected');
          if (loadedPrimed && qIdx === 0) tile.classList.add('load-target');
          if (qIdx === 9 || qIdx === 14 || qIdx === 19) tile.classList.add('landmark');
          attachDrag(tile, 'queue', qIdx, val);
        } else {
          tile.dataset.role = 'empty';
          tile.dataset.qidx = qIdx;
          if (qIdx === queue.length) {
            tile.classList.add('q-add');
            tile.textContent = '+';
            tile.addEventListener('click', () => openDialpad(tile));
            tile.addEventListener('touchend', e => { e.preventDefault(); openDialpad(tile); }, { passive:false });
          } else {
            tile.classList.add('q-empty');
            if (qIdx > queue.length) tile.classList.add('hidden-slot');
          }
        }
      }
      rowEl.appendChild(tile);
    }
    qGrid.appendChild(rowEl);
  }
}

function renderPool() {
  pGrid.innerHTML = '';
  pGrid.style.gridTemplateColumns = `repeat(${COLS}, var(--tile))`;
  // Dummy tile — always first, never leaves the pool
  const dummy = document.createElement('div');
  dummy.className = 'tile';
  dummy.textContent = 'Filler';
  dummy.style.cssText = 'background:rgba(180,180,180,.15);border:1.5px solid rgba(255,255,255,.18);color:rgba(255,255,255,.5);font-size:calc(var(--tile)*0.16);';
  dummy.dataset.role = 'filler-src';
  dummy.dataset.val  = 'filler';
  attachDrag(dummy, 'filler-src', null, 'dummy');
  pGrid.appendChild(dummy);

  [...pool].sort((a,b)=>a-b).forEach(num => {
    const tile = document.createElement('div');
    tile.className = 'tile pool';
    if (num === myNumber) tile.classList.add('my-tile');
    tile.textContent = num;
    tile.dataset.role = 'pool';
    tile.dataset.val  = num;
    attachDrag(tile, 'pool', null, num);
    pGrid.appendChild(tile);
  });

  const maxTile = document.createElement('div');
  maxTile.className = 'tile';
  maxTile.style.cssText = 'background:rgba(128,216,255,.06);border:1.5px dashed rgba(128,216,255,.2);color:rgba(128,216,255,.4);font-size:calc(var(--tile)*0.13);text-align:center;line-height:1.2;padding:4px;cursor:pointer;';
  maxTile.textContent = 'adjust highest taxi number';
  maxTile.addEventListener('click', () => openMaxDialpad(maxTile));
  maxTile.addEventListener('touchend', e => { e.preventDefault(); openMaxDialpad(maxTile); }, { passive: false });
  pGrid.appendChild(maxTile);
}

/* ── STATE MUTATORS ── */
function mutate(fn) {
  fn();
  rebuildPool(queue);
  saveToFirebase();
  render();
}

/* ── DRAG & DROP ── */
const HOLD_MS = 350;
const MOVE_PX = 10;

const dnd = {
  active: false,
  srcEl: null, val: null, source: null, srcIdx: null,
  ox: 0, oy: 0,
  startX: 0, startY: 0,
  holdTimer: null,
  canceled: false,
};

let lastTouchTime = 0; // track last touch to block synthetic mouse events on mobile

function attachDrag(el, source, idx, val) {
  // ── MOUSE (desktop) ──
  el.addEventListener('dragstart', e => e.preventDefault());
  el.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    // Block synthetic mouse events fired by browser after touch (iOS/Android)
    if (Date.now() - lastTouchTime < 500) return;
    e.preventDefault();
    const r = el.getBoundingClientRect();
    Object.assign(dnd, { srcEl:el, val, source, srcIdx:idx, canceled:false,
      ox:e.clientX-r.left, oy:e.clientY-r.top,
      startX:e.clientX, startY:e.clientY, active:false });
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup',   onMouseUp);
  });

  // ── TOUCH (mobile) — passive so scroll is never blocked ──
  el.addEventListener('touchstart', e => {
    lastTouchTime = Date.now(); // mark that a real touch happened
    const t = e.touches[0];
    const r = el.getBoundingClientRect();
    Object.assign(dnd, { srcEl:el, val, source, srcIdx:idx, canceled:false,
      ox:t.clientX-r.left, oy:t.clientY-r.top,
      startX:t.clientX, startY:t.clientY, active:false });

    // Hold timer — fires after HOLD_MS if finger hasn't moved much
    dnd.holdTimer = setTimeout(() => {
      if (!dnd.canceled) activateDrag(dnd.startX, dnd.startY);
    }, HOLD_MS);

    el.addEventListener('touchmove',   onTouchMove,   { passive:false });
    document.addEventListener('touchend',    onTouchEnd,    { once:true });
    document.addEventListener('touchcancel', onTouchCancel, { once:true });
  }, { passive:true });
}

// ── Activate drag (show ghost etc) ──
function activateDrag(cx, cy) {
  if (dnd.canceled) return;
  if (dnd.source === 'zero') { dnd.canceled = true; return; }
  clearSelected();
  dnd.active = true;
  const el = dnd.srcEl;
  const bg  = getComputedStyle(el).backgroundColor;
  const col = getComputedStyle(el).color;
  ghostEl.style.cssText = `background:${bg};color:${col};display:flex;`;
  ghostEl.textContent = (dnd.val === 'filler') ? 'Filler' : dnd.val;
  moveGhost(cx, cy);
  el.classList.add('dragging');
}

// ── MOUSE handlers ──
function onMouseMove(e) {
  if (!dnd.active) {
    const dx = e.clientX - dnd.startX, dy = e.clientY - dnd.startY;
    if (Math.sqrt(dx*dx+dy*dy) > MOVE_PX) activateDrag(e.clientX, e.clientY);
    else return;
  }
  moveGhost(e.clientX, e.clientY);
  updatePreview(e.clientX, e.clientY);
}

function onMouseUp(e) {
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup',   onMouseUp);
  if (!dnd.active) {
    const el = dnd.srcEl;
    resetDnd();
    handleTap(el);
    return;
  }
  ghostEl.style.display = 'none';
  const target = document.elementFromPoint(e.clientX, e.clientY)?.closest('.tile');
  const el = dnd.srcEl;
  // doDrop reads dnd state — call BEFORE resetDnd
  doDrop(target);
  finishDrag(el);
  resetDnd();
}

// ── TOUCH handlers ──
function onTouchMove(e) {
  const t = e.touches[0];
  const dx = t.clientX - dnd.startX, dy = t.clientY - dnd.startY;
  if (!dnd.active) {
    // Finger moved before hold fired — cancel drag, allow scroll
    if (Math.sqrt(dx*dx+dy*dy) > MOVE_PX) {
      clearTimeout(dnd.holdTimer);
      dnd.canceled = true;
      cancelTouchDrag();
    }
    // Don't preventDefault — let scroll happen freely
    return;
  }
  // Drag is active — prevent scroll so ghost can move
  e.preventDefault();
  moveGhost(t.clientX, t.clientY);
  updatePreview(t.clientX, t.clientY);
}

function onTouchEnd(e) {
  clearTimeout(dnd.holdTimer);
  dnd.srcEl?.removeEventListener('touchmove', onTouchMove);
  document.removeEventListener('touchcancel', onTouchCancel);
  if (!dnd.active) {
    const el = dnd.srcEl;
    const wasCanceled = dnd.canceled;
    resetDnd();
    if (!wasCanceled) handleTap(el);
    return;
  }
  const t = e.changedTouches[0];
  const cx = t.clientX, cy = t.clientY;
  // Hide ghost so elementFromPoint sees the tile underneath
  ghostEl.style.display = 'none';
  // Also temporarily hide the dragging tile so we see what's behind it
  dnd.srcEl?.style.setProperty('visibility','hidden');
  const target = document.elementFromPoint(cx, cy)?.closest('.tile');
  dnd.srcEl?.style.removeProperty('visibility');
  const el = dnd.srcEl;
  doDrop(target);
  finishDrag(el);
  resetDnd();
}

function onTouchCancel() {
  clearTimeout(dnd.holdTimer);
  cancelTouchDrag();
}

function cancelTouchDrag() {
  dnd.srcEl?.removeEventListener('touchmove',   onTouchMove);
  document.removeEventListener('touchend',    onTouchEnd);
  document.removeEventListener('touchcancel', onTouchCancel);
  finishDrag(dnd.srcEl);
  resetDnd();
}

function resetDnd() {
  dnd.active=false; dnd.srcEl=null; dnd.val=null; dnd.source=null;
  dnd.srcIdx=null; dnd.holdTimer=null; dnd.canceled=false;
}

function finishDrag(el) {
  clearPreview();
  ghostEl.style.display = 'none';
  clearDropHL();
  qGrid.querySelectorAll('.tile[data-qidx]').forEach(t => t.style.marginLeft = '');
  el?.classList.remove('dragging', 'drag-ready');
}


/* ── DIALPAD INPUT ── */
const dialpadInput = document.getElementById('dialpad-input');
let addTileEl = null;
let maxTileEl = null;

function openDialpad(tileEl) {
  addTileEl = tileEl;
  maxTileEl = null;
  tileEl.textContent = '_';
  tileEl.style.fontSize = 'calc(var(--tile) * 0.35)';
  dialpadInput.value = '';
  dialpadInput.style.pointerEvents = 'auto';
  dialpadInput.focus();
}

function openMaxDialpad(tileEl) {
  maxTileEl = tileEl;
  addTileEl = null;
  tileEl.textContent = '_';
  tileEl.style.fontSize = 'calc(var(--tile) * 0.35)';
  dialpadInput.value = '';
  dialpadInput.style.pointerEvents = 'auto';
  dialpadInput.focus();
}

dialpadInput.addEventListener('input', () => {
  const target = addTileEl || maxTileEl;
  if (!target) return;
  const raw = dialpadInput.value.trim();
  target.textContent = raw || '_';
  target.style.fontSize = raw.length > 2
    ? 'calc(var(--tile) * 0.28)'
    : 'calc(var(--tile) * 0.35)';
});

dialpadInput.addEventListener('keydown', e => { if (e.key === 'Enter') dialpadInput.blur(); });

dialpadInput.addEventListener('blur', () => {
  dialpadInput.style.pointerEvents = 'none';
  const raw = dialpadInput.value.trim();

  if (maxTileEl) {
    maxTileEl = null;
    if (raw) {
      const num = parseInt(raw);
      if (isNaN(num) || num < 1) {
        alert(`"${raw}" is not a valid number.`);
      } else {
        MAX_NUM = num;
        localStorage.setItem('taxi-max-num', MAX_NUM);
        rebuildPool(queue);
      }
    }
    render();
    return;
  }

  if (addTileEl) {
    addTileEl.textContent = '+';
    addTileEl.style.fontSize = '';
    addTileEl = null;
  }
  if (!raw) return;
  const num = parseInt(raw);
  if (isNaN(num) || num < 1 || num > MAX_NUM) {
    alert(`"${raw}" is not a valid taxi number (1–${MAX_NUM}).`);
    return;
  }
  if (!pool.has(num)) {
    alert(`Taxi ${num} is already in the queue.`);
    return;
  }
  mutate(() => { pool.delete(num); queue.push(num); }, 'added', num);
});

/* ── SELECTED TILE (double-tap to remove) ── */
let selectedQIdx = -1; // track by queue index, not element ref (DOM rebuilds on render)

function clearSelected() {
  selectedQIdx = -1;
  loadedPrimed = false;
  clearState = 0;
  qGrid.querySelectorAll('.tile.selected').forEach(t => t.classList.remove('selected'));
  qGrid.querySelectorAll('.tile.load-target').forEach(t => t.classList.remove('load-target'));
  const zeroTile = document.querySelector('.tile[data-role="zero"]');
  if (zeroTile) { zeroTile.classList.remove('primed', 'clear-armed', 'clear-confirm'); zeroTile.textContent = 'Loading'; }
}

// Clear selection when tapping outside a queue or loaded tile
document.addEventListener('pointerdown', e => {
  if (e.pointerType === 'touch') return;
  if (!e.target.closest('.tile[data-role="queue"]') && !e.target.closest('.tile[data-role="zero"]')) clearSelected();
});
// Clear selection when tapping a blank area on mobile
document.addEventListener('touchend', e => {
  if (!e.target.closest('.tile[data-role="queue"]') && !e.target.closest('.tile[data-role="zero"]')) {
    setTimeout(clearSelected, 0); // defer so tile's own onTouchEnd runs first
  }
}, { passive:true });

function handleTap(el) {
  if (!el) return;
  const role=el.dataset.role, rawVal=el.dataset.val;
  const val = rawVal === 'filler' ? 'dummy' : parseInt(rawVal);
  if (role==='zero') {
    if (clearState === 2) {
      clearSelected();
      mutate(() => { queue.length = 0; });
    } else if (clearState === 1) {
      clearState = 2;
      render();
    } else if (loadedPrimed) {
      clearSelected();
      if (queue.length > 0) {
        const v = queue[0];
        if (v === 'filler') mutate(() => { queue.splice(0, 1); });
        else mutate(() => { queue.splice(0, 1); pool.add(v); });
      }
    } else {
      if (queue.length === 0) return;
      clearSelected();
      loadedPrimed = true;
      render();
    }
  } else if (role==='filler-src') {
    mutate(() => { queue.push('filler'); }, 'added', 'Filler');
  } else if (role==='pool') {
    mutate(() => { pool.delete(val); queue.push(val); }, 'added', val);
  } else if (role==='queue') {
    const idx=parseInt(el.dataset.qidx);
    if (selectedQIdx === idx) {
      clearSelected();
      if (val === 'filler') {
        mutate(() => { queue.splice(idx,1); });
      } else {
        mutate(() => { queue.splice(idx,1); pool.add(val); });
      }
    } else {
      clearSelected();
      selectedQIdx = idx;
      el.classList.add('selected');
    }
  }
}

function moveGhost(x,y) { ghostEl.style.left=(x-dnd.ox)+'px'; ghostEl.style.top=(y-dnd.oy)+'px'; }

function doDrop(target) {
  if (dnd.source === 'zero') return;
  const val=dnd.val, src=dnd.source, si=dnd.srcIdx;
  const isDummy = (val === 'filler');

  // Use previewIdx as the canonical insertion point when set —
  // this covers the full gap zone (original tile position + shifted position)
  const ins = previewIdx >= 0 ? previewIdx : null;

  const role = target?.dataset.role;
  const ti   = parseInt(target?.dataset.qidx);

  // ── Pool / filler-src → queue ──
  if (src==='filler-src' || src==='pool') {
    const isF = src==='filler-src';
    const v   = isF ? 'filler' : val;

    if (ins !== null) {
      // Dropped in the gap preview zone
      mutate(()=>{ if(!isF) pool.delete(val); queue.splice(ins,0,v); },
             'added', isF?'Filler':val);
      return;
    }
    if (role==='queue'||role==='empty') {
      const idx = isNaN(ti)||ti>queue.length ? queue.length : ti;
      mutate(()=>{ if(!isF) pool.delete(val); queue.splice(idx,0,v); },
             'added', isF?'Filler':val);
      return;
    }
    if (target?.closest('#queue-wrapper')) {
      mutate(()=>{ if(!isF) pool.delete(val); queue.push(v); },
             'added', isF?'Filler':val);
      return;
    }
    // Dropped back in pool area — do nothing (tap handles removal)
    return;
  }

  // ── Queue tile → zero/load slot ──
  if (src==='queue' && role==='zero') {
    if (isDummy) mutate(()=>{ queue.splice(si,1); }, 'loaded', 'Filler');
    else         mutate(()=>{ queue.splice(si,1); pool.add(val); }, 'loaded', val);
    return;
  }

  // ── Queue tile → reorder ──
  if (src==='queue') {
    // Use previewIdx if set, otherwise fall back to target tile index
    const dest = ins !== null ? ins : (!isNaN(ti) ? ti : null);
    if (dest !== null && dest !== si) {
      mutate(()=>{ queue.splice(si,1); queue.splice(dest>si?dest-1:dest,0,val); }, 'moved', val);
      return;
    }
    // Dropped back on pool → remove
    if (role==='pool'||role==='filler-src') {
      if (isDummy) mutate(()=>{ queue.splice(si,1); }, 'removed', 'Filler');
      else         mutate(()=>{ queue.splice(si,1); pool.add(val); }, 'removed', val);
      return;
    }
  }
}

function clearDropHL() { document.querySelectorAll('.drop-ok').forEach(e=>e.classList.remove('drop-ok')); }

/* ── INSERT PREVIEW ── */
let previewIdx = -1; // queue index where gap is shown (-1 = none)

function updatePreview(cx, cy) {
  if (!['queue','pool','filler-src'].includes(dnd.source)) { clearPreview(); return; }

  // Sample multiple points around the cursor to pierce through the ghost/gap
  ghostEl.style.display = 'none';
  const offsets = [[0,0],[0,-22],[0,22],[-22,0],[22,0]];
  let el = null;
  for (const [dx,dy] of offsets) {
    const hit = document.elementFromPoint(cx+dx, cy+dy)?.closest(
      '.tile[data-role="queue"],.tile[data-role="empty"]'
    );
    if (hit && hit !== dnd.srcEl) { el = hit; break; }
  }
  ghostEl.style.display = 'flex';

  // If over zero/load slot, clear
  if (el && el.dataset.role === 'zero') { clearPreview(); return; }

  if (el) {
    const ti = parseInt(el.dataset.qidx);
    if (!isNaN(ti) && ti !== previewIdx) {
      previewIdx = ti;
      applyPreview();
    }
    // same tile — hold steady
  }
  // No tile found = hovering the gap we created — hold steady, no update
}

function clearPreview() {
  if (previewIdx === -1) return;
  previewIdx = -1;
  applyPreview();
}

function applyPreview() {
  // All queue tiles: shift right if at/after previewIdx, to show a gap
  const tiles = qGrid.querySelectorAll('.tile[data-qidx]');
  tiles.forEach(t => {
    const qi = parseInt(t.dataset.qidx);
    const isSrc = (dnd.source === 'queue' && qi === dnd.srcIdx);
    if (previewIdx >= 0 && qi === previewIdx && !isSrc) {
      t.style.marginLeft = 'calc(var(--tile) + var(--gap) * 2)';
    } else {
      t.style.marginLeft = '';
    }
  });
}

render();

/* ── DISABLE ZOOM ── */
// Block pinch-zoom
document.addEventListener('touchmove', e => {
  if (e.touches.length > 1) e.preventDefault();
}, { passive: false });

// Block double-tap zoom
let lastTap = 0;
document.addEventListener('touchend', e => {
  const now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, { passive: false });

</script>
</body>
</html>
