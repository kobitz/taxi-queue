<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Taxi Stand — History</title>
<style>
  :root {
    --bg: #2d1b69;
    --highlight: #80d8ff;
    --pad: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { overflow-x: hidden; max-width: 100vw; }
  body { background: var(--bg); min-height: 100dvh; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; padding: var(--pad); }

  header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; gap: 8px;
  }
  h1 { font-size: 13px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--highlight); opacity: 0.8; }

  #sync-status {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 3px 8px; border-radius: 20px; white-space: nowrap;
  }
  #sync-status.ok    { background: rgba(0,200,100,.25); color: #69ffb0; }
  #sync-status.error { background: rgba(255,80,80,.25);  color: #ff8080; }

  /* Filter bar */
  #filters {
    display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px;
  }
  .filter-btn {
    font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    padding: 5px 10px; border-radius: 20px; border: 1.5px solid rgba(255,255,255,.15);
    background: rgba(255,255,255,.06); color: rgba(255,255,255,.5);
    cursor: pointer; transition: all .15s;
  }
  .filter-btn.active { background: rgba(128,216,255,.2); color: #80d8ff; border-color: rgba(128,216,255,.4); }

  #search {
    flex: 1; min-width: 120px;
    background: rgba(255,255,255,.07); border: 1.5px solid rgba(255,255,255,.15);
    border-radius: 20px; color: #fff; font-size: 12px;
    padding: 5px 12px; outline: none;
  }
  #search::placeholder { color: rgba(255,255,255,.3); }

  /* Log */
  #log { display: flex; flex-direction: column; gap: 4px; }

  .entry {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 8px; align-items: center;
    background: rgba(255,255,255,.05);
    border-radius: 8px; padding: 8px 10px;
    animation: fadeIn .2s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(-4px); } to { opacity:1; transform:none; } }

  .entry.added    { border-left: 3px solid #1565c0; }
  .entry.removed  { border-left: 3px solid #ff5555; }
  .entry.loaded   { border-left: 3px solid #ffd600; }
  .entry.moved    { border-left: 3px solid #6a1b9a; }
  .entry.req1011  { border-left: 3px solid #ffd600; }

  .entry-action {
    font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase;
    padding: 2px 6px; border-radius: 10px; text-align: center; white-space: nowrap;
  }
  .added   .entry-action { background: rgba(21,101,192,.4);  color: #90caf9; }
  .removed .entry-action { background: rgba(255,85,85,.25);  color: #ff8080; }
  .loaded  .entry-action { background: rgba(255,214,0,.25);  color: #ffd600; }
  .moved   .entry-action { background: rgba(106,27,154,.4);  color: #ce93d8; }
  .req1011 .entry-action { background: rgba(255,214,0,.25);  color: #ffd600; }

  .entry-main { display: flex; flex-direction: column; gap: 2px; }
  .entry-value { font-size: 15px; font-weight: 700; }
  .entry-device { font-size: 10px; color: rgba(255,255,255,.4); }

  .entry-time { font-size: 10px; color: rgba(255,255,255,.35); text-align: right; white-space: nowrap; }

  #empty-state {
    text-align: center; color: rgba(255,255,255,.25);
    font-size: 12px; padding: 40px 0; display: none;
  }

  #clear-btn {
    font-size: 10px; font-weight: 700; letter-spacing: 1px;
    padding: 5px 10px; border-radius: 20px;
    background: rgba(255,80,80,.15); color: rgba(255,120,120,.8);
    border: 1.5px solid rgba(255,80,80,.25);
    cursor: pointer; transition: background .15s; white-space: nowrap;
  }
  #clear-btn:hover { background: rgba(255,80,80,.3); }
</style>
</head>
<body>

<header>
  <h1>History</h1>
  <div style="display:flex;gap:6px;align-items:center;">
    <button id="clear-btn">Clear All</button>
    <div id="sync-status" class="ok">LIVE</div>
  </div>
</header>

<div id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="added">Added</button>
  <button class="filter-btn" data-filter="removed">Dropped</button>
  <button class="filter-btn" data-filter="loaded">Loaded</button>
  <button class="filter-btn" data-filter="moved">Moved</button>
  <button class="filter-btn" data-filter="req1011">10-11</button>
  <input id="search" type="search" placeholder="Search taxi # or device…">
</div>

<div id="log"></div>
<div id="empty-state">No history yet</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getDatabase, ref, onValue, remove } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const app = initializeApp({
  apiKey: "AIzaSyPlaceholderNotNeededForRTDB",
  databaseURL: "https://taxi-queue-3e591-default-rtdb.firebaseio.com"
});
const db = getDatabase(app);
const historyRef = ref(db, 'history');
const syncEl = document.getElementById('sync-status');

let allEntries = [];
let activeFilter = 'all';
let searchTerm = '';

/* ── LIVE FEED ── */
onValue(historyRef, snapshot => {
  const data = snapshot.val();
  if (!data) { allEntries = []; }
  else {
    allEntries = Object.entries(data)
      .map(([key, val]) => ({ key, ...val }))
      .sort((a, b) => b.ts - a.ts); // newest first
  }
  syncEl.className = 'ok'; syncEl.textContent = 'LIVE';
  renderLog();
}, () => {
  syncEl.className = 'error'; syncEl.textContent = 'OFFLINE';
});

/* ── RENDER ── */
function renderLog() {
  const logEl = document.getElementById('log');
  const emptyEl = document.getElementById('empty-state');

  let entries = allEntries;

  if (activeFilter !== 'all') {
    entries = entries.filter(e => e.action === activeFilter);
  }
  if (searchTerm) {
    const s = searchTerm.toLowerCase();
    entries = entries.filter(e =>
      String(e.value).toLowerCase().includes(s) ||
      (e.device || '').toLowerCase().includes(s)
    );
  }

  logEl.innerHTML = '';

  if (!entries.length) {
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  entries.forEach(entry => {
    const el = document.createElement('div');
    el.className = `entry ${entry.action}`;

    const actionLabels = { added: 'Added', removed: 'Dropped', loaded: 'Loaded', moved: 'Moved', req1011: '10-11' };
    const timeStr = formatTime(entry.ts);

    el.innerHTML = `
      <div class="entry-action">${actionLabels[entry.action] || entry.action}</div>
      <div class="entry-main">
        <div class="entry-value">${entry.value}</div>
        <div class="entry-device">${entry.device || 'Unknown'}</div>
      </div>
      <div class="entry-time">${timeStr}</div>
    `;
    logEl.appendChild(el);
  });
}

function formatTime(ts) {
  const d = new Date(ts);
  const now = new Date();
  const diffMs = now - d;
  const diffMin = Math.floor(diffMs / 60000);
  const diffHr  = Math.floor(diffMs / 3600000);

  if (diffMin < 1)   return 'just now';
  if (diffMin < 60)  return `${diffMin}m ago`;
  if (diffHr  < 24)  return `${diffHr}h ago`;

  // Older: show date + time
  return d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' +
         d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

/* ── FILTERS ── */
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderLog();
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  renderLog();
});

/* ── CLEAR ── */
document.getElementById('clear-btn').addEventListener('click', () => {
  if (confirm('Clear all history? This cannot be undone.')) {
    remove(historyRef);
  }
});
</script>
</body>
</html>
